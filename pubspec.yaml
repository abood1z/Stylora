name: stylora
description: "A new Flutter project."
publish_to: 'none' 

version: 1.2.12+22 

environment:
  sdk: ^3.11.0
dependencies:    
  flutter:
    sdk: flutter    
  tflite_flutter: 0.12.1
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  image_picker: ^1.2.1
  camera: ^0.10.5+9
  easy_localization: ^3.0.8
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.12
  cloudinary_public: 0.23.1
  google_sign_in: ^6.2.1
  local_auth: ^2.3.0
  image: ^4.1.3
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  wechat_assets_picker: ^10.1.1
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^21.0.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.1
  flutter_secure_storage: ^9.2.2
  otp: ^3.1.3
  qr_flutter: ^4.1.0
  base32: ^2.2.0
  csc_picker_plus: ^0.0.3
  google_mlkit_pose_detection: ^0.14.1
  google_mlkit_commons: ^0.11.1
  flutter_image_compress: ^2.4.0
  compute: ^1.0.2
  timeago: ^3.7.1
  http: ^1.6.0
  gal: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
    - assets/app_icon.png
    - assets/models/category_model.tflite
    - assets/models/sleeve_model.tflite
    - assets/models/yolo11m-seg.tflite
